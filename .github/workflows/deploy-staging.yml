---
name: Deploy - Staging

"on":
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15

    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      # Intentional: Use wrapper script to handle vitest pool crashes (LESSON-022)
      - name: Run tests
        run: ./scripts/run-tests-ci.sh

      - name: Deploy to Cloudflare Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify staging deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15

          # Health check
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          HEALTH_URL="https://do-deal-relay-staging.${ACCOUNT_ID}.workers.dev/health"
          echo "Checking health at: ${HEALTH_URL}"

          for i in {1..5}; do
            if curl -sf "${HEALTH_URL}"; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

          echo "❌ Staging health check failed after 5 attempts"
          exit 1
        continue-on-error: true

      - name: Run smoke tests on staging
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          STAGING_URL="https://do-deal-relay-staging.${ACCOUNT_ID}.workers.dev"

          echo "Running smoke tests on staging..."

          # Test health endpoint
          curl -sf "${STAGING_URL}/health" || exit 1
          echo "✅ Health endpoint OK"

          # Test metrics endpoint
          curl -sf "${STAGING_URL}/metrics" || exit 1
          echo "✅ Metrics endpoint OK"

          # Test deals endpoint
          curl -sf "${STAGING_URL}/deals" || exit 1
          echo "✅ Deals endpoint OK"

          # Test API status endpoint
          curl -sf "${STAGING_URL}/api/status" || exit 1
          echo "✅ API status endpoint OK"

          echo "All smoke tests passed!"

      - name: Notify on success
        if: success()
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Staging deployment completed successfully"
          echo "URL: https://do-deal-relay-staging.${ACCOUNT_ID}.workers.dev"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const runId = context.runId;
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const title = 'Staging deployment failed';

            // Check for existing open staging issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment,staging,failed'
            });

            const duplicateExists = existingIssues.data.some(issue =>
              issue.title === title && issue.body.includes(sha.substring(0, 7))
            );

            if (duplicateExists) {
              console.log(`Staging issue already exists for ${sha.substring(0, 7)}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `Staging deployment failed for commit ${sha}.\n\n` +
                `[View workflow run](${url}/actions/runs/${runId})`,
              labels: ['deployment', 'staging', 'failed']
            });
