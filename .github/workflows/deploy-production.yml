name: Deploy - Production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "Confirm production deployment"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  actions: write
  checks: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Full test suite
        run: npm run test:ci

      - name: Run quality gate
        run: ./scripts/quality_gate.sh

      - name: Verify staging is healthy
        if: github.ref != 'refs/heads/main'
        run: |
          STAGING_URL="https://do-deal-relay-staging.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/health"
          echo "Verifying staging environment is healthy..."

          if ! curl -sf "$STAGING_URL"; then
            echo "❌ Staging environment is not healthy. Aborting production deployment."
            exit 1
          fi
          echo "✅ Staging environment is healthy"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: pre-deploy-checks
    timeout-minutes: 15

    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && (github.event.inputs.confirm_deploy == true || github.event_name == 'push')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Production
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify production deployment
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15

          # Health check
          HEALTH_URL="https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/health"
          echo "Checking health at: $HEALTH_URL"

          for i in {1..5}; do
            if curl -sf "$HEALTH_URL"; then
              echo "✅ Production health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done

          echo "❌ Production health check failed after 5 attempts"
          exit 1
        continue-on-error: true

      - name: Run smoke tests on production
        run: |
          PROD_URL="https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"

          echo "Running smoke tests on production..."

          # Test health endpoint (may return 503 for fresh deployments)
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
          if [ "$HEALTH_STATUS" = "200" ] || [ "$HEALTH_STATUS" = "503" ]; then
            echo "✅ Health endpoint OK (status: $HEALTH_STATUS)"
          else
            echo "❌ Health endpoint failed with status $HEALTH_STATUS"
            exit 1
          fi

          # Test metrics endpoint
          curl -sf "$PROD_URL/metrics" || exit 1
          echo "✅ Metrics endpoint OK"

          # Test deals endpoint (may return 404 for fresh deployments with no data)
          DEALS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/deals" || echo "000")
          if [ "$DEALS_STATUS" = "200" ] || [ "$DEALS_STATUS" = "404" ]; then
            echo "✅ Deals endpoint OK (status: $DEALS_STATUS)"
          else
            echo "❌ Deals endpoint failed with status $DEALS_STATUS"
            exit 1
          fi

          # Test API status endpoint
          curl -sf "$PROD_URL/api/status" || exit 1
          echo "✅ API status endpoint OK"

          echo "All production smoke tests passed!"
        continue-on-error: true

      - name: Trigger initial discovery
        run: |
          echo "Triggering discovery pipeline..."
          curl -sf -X POST "https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/api/discover" || true
        continue-on-error: true

      - name: Create deployment summary
        run: |
          echo "## Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- Health: https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/health" >> $GITHUB_STEP_SUMMARY
          echo "- Metrics: https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/metrics" >> $GITHUB_STEP_SUMMARY
          echo "- Deals: https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/deals" >> $GITHUB_STEP_SUMMARY

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `Production deployment for version ${tag}.\n\nDeployed automatically via GitHub Actions.`,
              draft: false,
              prerelease: false
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production deployment failed - ${context.sha.substring(0, 7)}`,
              body: `Production deployment failed for commit ${context.sha}.\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['deployment', 'production', 'failed', 'urgent']
            });

  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Wrangler
        run: npm install -g wrangler@4.79.0

      - name: Rollback to previous version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Attempting to rollback..."
          # Get deployment list and rollback to previous
          wrangler deployments list --name do-deal-relay --env production || true
          echo "Please manually rollback via Cloudflare dashboard if needed"
        continue-on-error: true

      - name: Create rollback notification
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ROLLBACK REQUIRED - Production deployment failed`,
              body: `Production deployment failed and may require manual rollback.\n\n- Commit: ${context.sha}\n- Failed run: [View workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n**Action Required**: Check Cloudflare dashboard and rollback if necessary.`,
              labels: ['deployment', 'production', 'rollback', 'urgent']
            });
        continue-on-error: true
