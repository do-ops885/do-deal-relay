---
name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.4)"
        required: true
        type: string
      create_tag:
        description: "Create git tag for this version"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  actions: write
  checks: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VERSION"

      - name: Verify VERSION file matches
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION="${{ steps.get-version.outputs.version }}"

          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ VERSION file ($FILE_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ VERSION file matches tag"

      - name: Verify package.json matches
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.get-version.outputs.version }}"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ package.json ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✅ package.json matches tag"

  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: validate-version
    if: github.event_name == 'workflow_dispatch' && inputs.create_tag == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          TAG="v${{ needs.validate-version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag $TAG"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        id: changelog
        run: |
          TAG="v${{ needs.validate-version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --format="- %s (%h)" "$TAG" || echo "- Initial release")
          else
            COMMITS=$(git log --format="- %s (%h)" "$PREV_TAG..$TAG" || echo "")
          fi

          {
            echo "## Changes"
            echo ""
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- No changes since last release"
            fi
            echo ""
            echo "## Installation"
            echo ""
            echo "\`\`\`bash"
            echo "git clone https://github.com/${{ github.repository }}.git"
            echo "cd do-deal-relay"
            echo "git checkout $TAG"
            echo "npm install"
            echo "\`\`\`"
            echo ""
            echo "## Deploy"
            echo ""
            echo "\`\`\`bash"
            echo "npm run build"
            echo "npm run deploy"
            echo "\`\`\`"
          } > CHANGELOG_BODY.md

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG_BODY.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'v${{ needs.validate-version.outputs.version }}';
            const version = '${{ needs.validate-version.outputs.version }}';
            const body = `${{ steps.changelog.outputs.body }}`;

            // Check if release already exists
            const existingReleases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const existingRelease = existingReleases.data.find(r => r.tag_name === tag);

            if (existingRelease) {
              console.log(`Release ${tag} already exists, updating...`);
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id,
                name: `Release ${tag}`,
                body: body,
                draft: false,
                prerelease: version.includes('-')
              });
              console.log(`✅ Updated release ${tag}`);
            } else {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Release ${tag}`,
                body: body,
                draft: false,
                prerelease: version.includes('-'),
                make_latest: true
              });
              console.log(`✅ Created release ${tag}`);
            }

  deploy-production:
    name: Deploy to Production
    needs: [validate-version, create-release]
    uses: ./.github/workflows/deploy-production.yml
    with:
      confirm_deploy: true
    secrets: inherit

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [validate-version, create-release, deploy-production]
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy-production.result == 'success'
        run: |
          echo "::notice::Release v${{ needs.validate-version.outputs.version }} deployed successfully"

      - name: Notify failure
        if: needs.deploy-production.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate-version.outputs.version }}';
            const tag = `v${version}`;
            const sha = context.sha;
            const runId = context.runId;
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const title = `Release ${tag} deployment failed`;

            // Check for existing open issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'release,failed'
            });

            const duplicateExists = existingIssues.data.some(issue =>
              issue.title === title || issue.title.includes(tag)
            );

            if (duplicateExists) {
              console.log(`Issue already exists for release failure of ${tag}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `Release ${tag} deployment failed.\n\n` +
                `- Version: ${version}\n` +
                `- Commit: ${sha}\n` +
                `- Release: ${url}/releases/tag/${tag}\n` +
                `- [View workflow run](${url}/actions/runs/${runId})\n\n` +
                '**Action Required**: Check deployment logs and retry.',
              labels: ['release', 'failed', 'urgent']
            });
