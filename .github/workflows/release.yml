---
name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.4)"
        required: true
        type: string
      create_tag:
        description: "Create git tag for this version"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  actions: write
  checks: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.get-version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Verify VERSION file matches
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION="${{ steps.get-version.outputs.version }}"

          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "VERSION file matches tag"

      - name: Verify package.json matches
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.get-version.outputs.version }}"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "package.json matches tag"

  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: validate-version
    if: github.event_name == 'workflow_dispatch' && inputs.create_tag == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          TAG="v${{ needs.validate-version.outputs.version }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag $TAG"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate-version
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate release body
        run: |
          chmod +x scripts/generate-release-body.sh
          TAG="v${{ needs.validate-version.outputs.version }}"
          bash scripts/generate-release-body.sh "$TAG" "${{ github.repository }}" > release-body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.validate-version.outputs.version }}"
          VERSION="${{ needs.validate-version.outputs.version }}"

          # Check if release already exists
          EXISTING=$(gh release view "$TAG" --json id --jq '.id' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "Release $TAG" \
              --notes-file release-body.md \
              --prerelease=false
            echo "Updated release $TAG"
          else
            IS_PRERELEASE="false"
            if echo "$VERSION" | grep -q '-'; then
              IS_PRERELEASE="true"
            fi
            gh release create "$TAG" \
              --title "Release $TAG" \
              --notes-file release-body.md \
              --generate-notes=false \
              --prerelease="$IS_PRERELEASE" \
              --latest
            echo "Created release $TAG"
          fi

  deploy-production:
    name: Deploy to Production
    needs: [validate-version, create-release]
    uses: ./.github/workflows/deploy-production.yml
    with:
      confirm_deploy: true
    secrets: inherit

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [validate-version, create-release, deploy-production]
    if: always()

    steps:
      - name: Notify success
        if: needs.deploy-production.result == 'success'
        run: |
          echo "::notice::Release v${{ needs.validate-version.outputs.version }} deployed successfully"

      - name: Notify failure
        if: needs.deploy-production.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate-version.outputs.version }}';
            const tag = `v${version}`;
            const sha = context.sha;
            const runId = context.runId;
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const title = `Release ${tag} deployment failed`;

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'release,failed'
            });

            const duplicateExists = existingIssues.data.some(issue =>
              issue.title === title || issue.title.includes(tag)
            );

            if (duplicateExists) {
              console.log(`Issue already exists for release failure of ${tag}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `Release ${tag} deployment failed.\n\n` +
                `- Version: ${version}\n` +
                `- Commit: ${sha}\n` +
                `- Release: ${url}/releases/tag/${tag}\n` +
                `- [View workflow run](${url}/actions/runs/${runId})\n\n` +
                '**Action Required**: Check deployment logs and retry.',
              labels: ['release', 'failed', 'urgent']
            });
