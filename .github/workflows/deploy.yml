name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf "https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/health" || exit 1
        continue-on-error: true

      - name: Trigger initial discovery
        run: |
          curl -sf -X POST "https://do-deal-relay.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/api/discover" || true
        continue-on-error: true

  create-kv:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Wrangler
        run: npm install -g wrangler@3.50.0

      - name: Create KV Namespaces
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Create production namespaces with error handling
          wrangler kv:namespace create "DEALS_PROD"
          wrangler kv:namespace create "DEALS_STAGING" 
          wrangler kv:namespace create "DEALS_LOG"
          wrangler kv:namespace create "DEALS_LOCK"
          wrangler kv:namespace create "DEALS_SOURCES"

          echo "KV namespaces created. Update wrangler.toml with the IDs."
