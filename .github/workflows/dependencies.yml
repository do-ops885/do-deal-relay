name: Dependency Updates

on:
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: dependency-updates
  cancel-in-progress: false

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for updates
        id: check-updates
        run: |
          # Check for outdated packages
          npm outdated --json > outdated.json || true

          # Count outdated packages
          COUNT=$(cat outdated.json | jq 'length')
          echo "outdated_count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -eq 0 ]; then
            echo "✅ All dependencies are up to date"
            exit 0
          fi

          echo "Found $COUNT outdated packages"
          cat outdated.json | jq -r 'to_entries[] | "\(.key): \(.value.current) → \(.value.latest)"'

      - name: Update packages
        if: steps.check-updates.outputs.outdated_count > 0
        run: |
          # Update minor and patch versions only
          npm update

          # Run tests to ensure updates don't break anything
          npm run test:ci || {
            echo "⚠️ Tests failed after update"
            exit 1
          }

      - name: Create Pull Request
        if: steps.check-updates.outputs.outdated_count > 0
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): weekly dependency updates"
          body: |
            ## Dependency Updates

            This PR updates project dependencies to their latest compatible versions.

            ### Changes
            - Updated npm packages via `npm update`
            - All tests passing

            ### Verification
            - [ ] Review changelog of updated packages
            - [ ] Verify application functionality
            - [ ] Check for breaking changes

            Auto-generated by GitHub Actions.
          branch: deps/weekly-updates
          delete-branch: true
          labels: dependencies,automated

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.check-updates.outputs.outdated_count }}" -eq 0 ]; then
            echo "✅ No dependency updates needed"
          elif [ "${{ steps.update-packages.outcome }}" == "success" ]; then
            echo "✅ Dependencies updated successfully"
          else
            echo "❌ Dependency update failed"
          fi
