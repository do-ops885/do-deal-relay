---
name: Dependency Updates

"on":
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: dependency-updates
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for updates
        id: check-updates
        run: |
          # Check for outdated packages - ensure valid JSON output
          npm outdated --json > outdated.json 2>/dev/null || echo '{}' > outdated.json

          # Count outdated packages
          COUNT=$(jq 'length' < outdated.json)
          echo "outdated_count=${COUNT}" >> "$GITHUB_OUTPUT"

          if [ "${COUNT}" -eq 0 ]; then
            echo "✅ All dependencies are up to date"
            exit 0
          fi

          echo "Found ${COUNT} outdated packages"
          jq -r 'to_entries[] | "\(.key): \(.value.current) → \(.value.latest)"' < outdated.json

      - name: Update packages
        id: update-packages
        if: steps.check-updates.outputs.outdated_count > 0
        run: |
          # Update minor and patch versions only
          npm update

          # Run tests to ensure updates don't break anything
          # Use wrapper script to handle vitest pool crashes (LESSON-022)
          ./scripts/run-tests-ci.sh || {
            echo "⚠️ Tests failed after update"
            exit 1
          }

      - name: Create Pull Request
        if: steps.check-updates.outputs.outdated_count > 0
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update dependencies"
          title: "chore(deps): weekly dependency updates"
          body: |
            ## Dependency Updates

            This PR updates project dependencies to their latest compatible versions.

            ### Changes
            - Updated npm packages via `npm update`
            - All tests passing

            ### Verification
            - [ ] Review changelog of updated packages
            - [ ] Verify application functionality
            - [ ] Check for breaking changes

            Auto-generated by GitHub Actions.
          branch: deps/weekly-updates
          delete-branch: true
          labels: dependencies,automated

      - name: Report status
        if: always()
        run: |
          OUTDATED="${{ steps.check-updates.outputs.outdated_count }}"
          if [ "${OUTDATED}" = "0" ]; then
            echo "✅ No dependency updates needed"
          elif [ "${{ steps.update-packages.outcome }}" = "success" ]; then
            echo "✅ Dependencies updated successfully"
          else
            echo "❌ Dependency update failed"
          fi
