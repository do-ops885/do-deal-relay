---
name: Cleanup

"on":
  schedule:
    # Run monthly on the 1st at 4 AM UTC
    - cron: "0 4 1 * *"
  workflow_dispatch:

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write

    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const daysToKeep = 30;
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - daysToKeep);

            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            let deleted = 0;

            for (const workflow of workflows.data.workflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflow.id,
                status: 'completed',
                per_page: 100
              });

              for (const run of runs.data.workflow_runs) {
                const runDate = new Date(run.created_at);
                if (runDate < cutoff) {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id
                  });
                  deleted++;
                }
              }
            }

            console.log(`Deleted ${deleted} old workflow runs`);

  cleanup-caches:
    name: Cleanup Caches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write

    steps:
      - name: Clear old caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            // Keep only the 5 most recent caches
            const cachesToDelete = caches.data.actions_caches.slice(5);

            for (const cache of cachesToDelete) {
              await github.rest.actions.deleteActionsCacheById({
                owner: context.repo.owner,
                repo: context.repo.repo,
                cache_id: cache.id
              });
            }

            console.log(`Deleted ${cachesToDelete.length} old caches`);

  stale-issues:
    name: Mark Stale Issues
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security,work-in-progress"
          remove-stale-when-updated: true
