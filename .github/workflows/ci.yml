name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup wrangler.toml for CI
        run: bash scripts/generate-wrangler-ci.sh

      - name: Run Quality Gate
        run: ./scripts/quality_gate.sh

  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  validate-codes:
    name: Validation Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup wrangler.toml for CI
        run: bash scripts/generate-wrangler-ci.sh

      - name: Run validation script
        run: ./scripts/validate-codes.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection - TruffleHog
        run: |
          # Install TruffleHog
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

          # Handle single-commit scenario where BASE and HEAD are the same
          if [ "${{ github.event.before }}" == "${{ github.sha }}" ] || [ -z "${{ github.event.before }}" ]; then
            echo "Single commit push or missing base - running full filesystem scan"
            trufflehog filesystem . --only-verified --json || true
          else
            echo "Running incremental scan from ${{ github.event.before }} to ${{ github.sha }}"
            trufflehog git file://. --since-commit ${{ github.event.before }} --only-verified --json || true
          fi
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Check for actual secret patterns (not variable names or type definitions)
          # Excludes:
          #   - TypeScript type annotations (e.g., "secret: string")
          #   - Interface property definitions (e.g., "secret: string,")
          #   - Object property access (e.g., "config.secret")
          #   - Template literals with variables (e.g., "apikey:${var}")
          #   - Function parameters and comments
          if grep -rE "api[_-]?key\s*[=:]\s*[\"'][^${}]" \
              --include="*.ts" --include="*.js" --include="*.json" . 2>/dev/null | \
              grep -v "node_modules\|\.env\|test\|example\|\.d\.ts" | \
              grep -vE "secret:\s*(string|boolean|number)\b|:\s*string[,;]?$|\w+\.secret\b|apikey:\$\{|// .*secret|/\* .*secret" | \
              head -20; then
            echo "Potential secrets found in code. Please review."
            exit 1
          fi

          # Check for high-entropy secret patterns (GitHub tokens, API keys)
          if grep -rE "ghp_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{48}|sk_live_[a-zA-Z0-9]{24,}|sk_test_[a-zA-Z0-9]{24,}|AKIA[0-9A-Z]{16}" \
              --include="*.ts" --include="*.js" --include="*.json" --include="*.yml" --include="*.yaml" . 2>/dev/null | \
              grep -v "node_modules\|\.env\|test\|example" | \
              head -20; then
            echo "High-entropy secrets found in code. Immediate review required."
            exit 1
          fi

          echo "No hardcoded secrets detected."
        continue-on-error: true

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .
        continue-on-error: true

      - name: Type check (as lint)
        run: npm run lint

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      [
        quality-gate,
        type-check,
        test,
        validate-codes,
        security-scan,
        lint,
        build-check,
      ]
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript Check | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation Gates | ${{ needs.validate-codes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Check | ${{ needs.build-check.result }} |" >> $GITHUB_STEP_SUMMARY

          # Check if any required job failed
          if [[ "${{ needs.quality-gate.result }}" == "failure" ]] || \
             [[ "${{ needs.type-check.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-codes.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ CI Failed - Check individual jobs for details" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All checks passed" >> $GITHUB_STEP_SUMMARY
          fi
