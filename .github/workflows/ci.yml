---
name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Quality Gate
        run: ./scripts/quality_gate.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: ./scripts/run-tests-ci.sh
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  validate-codes:
    name: Validation Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run validation script
        run: ./scripts/validate-codes.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Secret Detection - TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns with actual values (not type definitions)
          # This regex looks for patterns like: secret = "value", apiKey: "value", password: 'value'
          # But excludes: type definitions, interface properties, and comments

          SECRETS_FOUND=0

          # Pattern 1: Variable/property assignments with string values
          # Matches: secret = "...", apiKey: "...", etc.
          if grep -rE '(api[_-]?key|password|secret)\s*[=:]\s*["'\''"'\'''][^"'\''"'\''"]{8,}["'\''"'\''"]' \
            --include="*.ts" --include="*.js" --include="*.json" . \
            | grep -v "node_modules\|\.env\|test\|example\|\.d\.ts" \
            | grep -v "// \|/\*\|type\|interface\|: string\|: Secret"; then
            echo "❌ Potential hardcoded secrets found (assignments with values)"
            SECRETS_FOUND=1
          fi

          # Pattern 2: High-entropy strings that look like tokens/keys
          # Matches patterns like: Bearer abc123..., sk-abc..., ghp_..., etc.
          # shellcheck disable=SC2016
          TOKEN_PATTERN='(bearer\s+[a-zA-Z0-9_-]{20,}|sk-[a-zA-Z0-9]{20,}'
          TOKEN_PATTERN="${TOKEN_PATTERN}"'|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|AKIA[0-9A-Z]{16})'
          if grep -rE "$TOKEN_PATTERN" \
            --include="*.ts" --include="*.js" --include="*.json" . \
            | grep -v "node_modules\|\.env\|test\|example"; then
            echo "❌ Potential API tokens found"
            SECRETS_FOUND=1
          fi

          # Pattern 3: Private keys (more serious)
          if grep -rE '(BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY|BEGIN PGP PRIVATE)' \
            --include="*.ts" --include="*.js" --include="*.json" --include="*.pem" --include="*.key" . \
            | grep -v "node_modules\|\.env\|test\|example"; then
            echo "❌ Private keys found!"
            SECRETS_FOUND=1
          fi

          if [ "${SECRETS_FOUND}" -eq 1 ]; then
            echo "Potential secrets detected. Please review the matches above."
            echo "If these are false positives (type definitions, property names, etc.), they can be ignored."
            # Don't fail the build for these patterns - just warn
            # exit 1
          else
            echo "✅ No obvious hardcoded secrets found"
          fi

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check formatting
        run: npx prettier --check .
        continue-on-error: true

      - name: Type check (as lint)
        run: npm run lint

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      [quality-gate, test, validate-codes, security-scan, lint, build-check]
    if: always()

    steps:
      - name: Report Status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Gate | ${{ needs.quality-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation Gates | ${{ needs.validate-codes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Check | ${{ needs.build-check.result }} |" >> $GITHUB_STEP_SUMMARY

          # Check if any required job failed
          if [[ "${{ needs.quality-gate.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-codes.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ CI Failed - Check individual jobs for details" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All checks passed" >> $GITHUB_STEP_SUMMARY
          fi
