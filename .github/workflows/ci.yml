---
name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Quality Gate
        run: ./scripts/quality_gate.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: ./scripts/run-tests-ci.sh
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  validate-codes:
    name: Validation Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run validation script
        run: ./scripts/validate-codes.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection - TruffleHog shell script
        run: |
          # Install TruffleHog
          INSTALL_URL="https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh"
          curl -sSfL "$INSTALL_URL" | sh -s -- -b /usr/local/bin

          # Handle single-commit scenario where BASE and HEAD are the same
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          if [ "$BEFORE" == "$SHA" ] || [ -z "$BEFORE" ]; then
            echo "Single commit push - running full filesystem scan"
            trufflehog filesystem . --only-verified --json || true
          else
            echo "Running incremental scan from $BEFORE to $SHA"
            trufflehog git file://. --since-commit "$BEFORE" \
              --only-verified --json || true
          fi
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Simple secret detection - checks for common patterns
          echo "Checking for potential secrets..."

          # Check for private keys (most critical)
          FOUND=0
          if grep -rE "BEGIN.*PRIVATE KEY" \
            --include="*.ts" --include="*.js" --include="*.md" . 2>/dev/null | \
            grep -v "node_modules\|test\|example\|\.d\.ts\|README\|AGENTS\|LESSONS" ; then
            echo "⚠️  Private key patterns found - review required"
            FOUND=1
          fi

          # Check for common API token patterns
          if grep -rE "ghp_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{20,}" \
            --include="*.ts" --include="*.js" . 2>/dev/null | \
            grep -v "node_modules\|test\|example\|\.d\.ts\|SKILL\|SKILLS" ; then
            echo "⚠️  Potential API tokens found - review required"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "⚠️  Potential secrets detected - manual review recommended"
            # Don't fail the build, just warn
            exit 0
          fi

          echo "✅ No obvious hardcoded secrets found"

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check formatting
        run: npx prettier --check .
        continue-on-error: true

      - name: Type check (as lint)
        run: npm run lint

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      [quality-gate, test, validate-codes, security-scan, lint, build-check]
    if: always()

    steps:
      - name: Report Status
        run: |
          QUALITY_GATE_RESULT="${{ needs.quality-gate.result }}"
          TEST_RESULT="${{ needs.test.result }}"
          VALIDATE_CODES_RESULT="${{ needs.validate-codes.result }}"
          SECURITY_SCAN_RESULT="${{ needs.security-scan.result }}"
          LINT_RESULT="${{ needs.lint.result }}"
          BUILD_CHECK_RESULT="${{ needs.build-check.result }}"
          {
            echo "## CI Results"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Quality Gate | $QUALITY_GATE_RESULT |"
            echo "| Unit Tests | $TEST_RESULT |"
            echo "| Validation Gates | $VALIDATE_CODES_RESULT |"
            echo "| Security Scan | $SECURITY_SCAN_RESULT |"
            echo "| Lint & Format | $LINT_RESULT |"
            echo "| Build Check | $BUILD_CHECK_RESULT |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Check if any required job failed
          if [[ "$QUALITY_GATE_RESULT" == "failure" ]] || \
             [[ "$TEST_RESULT" == "failure" ]] || \
             [[ "$VALIDATE_CODES_RESULT" == "failure" ]] || \
             [[ "$SECURITY_SCAN_RESULT" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ CI Failed - Check individual jobs for details" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ All CI checks passed!" >> "$GITHUB_STEP_SUMMARY"
          fi
