---
name: CI

"on":
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Quality Gate
        run: ./scripts/quality_gate.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests
        run: ./scripts/run-tests-ci.sh
        env:
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  validate-codes:
    name: Validation Gates
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run validation script
        run: ./scripts/validate-codes.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Detection - TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Simple secret detection - checks for common patterns
          echo "Checking for potential secrets..."

          # Check for private keys (most critical)
          FOUND=0
          if grep -rE "BEGIN.*PRIVATE KEY" \
            --include="*.ts" --include="*.js" --include="*.md" . 2>/dev/null | \
            grep -v "node_modules\|test\|example\|\.d\.ts\|README\|AGENTS\|LESSONS" ; then
            echo "⚠️  Private key patterns found - review required"
            FOUND=1
          fi

          # Check for common API token patterns
          if grep -rE "ghp_[a-zA-Z0-9]{36}|sk-[a-zA-Z0-9]{20,}" \
            --include="*.ts" --include="*.js" . 2>/dev/null | \
            grep -v "node_modules\|test\|example\|\.d\.ts\|SKILL\|SKILLS" ; then
            echo "⚠️  Potential API tokens found - review required"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "⚠️  Potential secrets detected - manual review recommended"
            # Don't fail the build, just warn
            exit 0
          fi

          echo "✅ No obvious hardcoded secrets found"

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check formatting
        run: npx prettier --check .
        continue-on-error: true

      - name: Type check (as lint)
        run: npm run lint

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build TypeScript
        run: npm run build

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      [quality-gate, test, validate-codes, security-scan, lint, build-check]
    if: always()

    steps:
      - name: Report Status
        run: |
          {
            echo "## CI Results"
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Quality Gate | ${{ needs.quality-gate.result }} |"
            echo "| Unit Tests | ${{ needs.test.result }} |"
            echo "| Validation Gates | ${{ needs.validate-codes.result }} |"
            echo "| Security Scan | ${{ needs.security-scan.result }} |"
            echo "| Lint & Format | ${{ needs.lint.result }} |"
            echo "| Build Check | ${{ needs.build-check.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Check if any required job failed
          if [[ "${{ needs.quality-gate.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.validate-codes.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ CI Failed - Check individual jobs for details" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ All CI checks passed!" >> "$GITHUB_STEP_SUMMARY"
          fi
